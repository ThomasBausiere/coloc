<section class="stuff" aria-label="Équipement">

  <h2 class="stuff__title title">Équipement</h2>

  <div class="stuff__list">
    @for (item of items; track item.label) {
      <div class="stuff__pill">
        <img
          class="stuff__icon"
          [src]="item.icon"
          alt=""
          aria-hidden="true"
        />
        <span class="stuff__text texts">{{ item.label }}</span>
      </div>
    }
  </div>

</section>
